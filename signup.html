<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Create Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Blue & White Parallax Background */
        .parallax-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
            background: linear-gradient(135deg, #ffffff 0%, #e3f2fd 50%, #1e3c72 100%);
        }

        .parallax-layer {
            position: absolute;
            width: 120%;
            height: 120%;
            top: -10%;
            left: -10%;
        }

        .layer-1 {
            background: 
                radial-gradient(circle at 80% 20%, rgba(30,60,114,0.2) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(42,82,152,0.2) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        .layer-2 {
            background-image: 
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(30,60,114,0.05) 35px, rgba(30,60,114,0.05) 70px);
            animation: slide 30s linear infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, 30px) scale(1.1); }
            66% { transform: translate(20px, -20px) scale(0.9); }
        }

        @keyframes slide {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-70px, 70px); }
        }

        /* Blue Particles */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(30, 60, 114, 0.2);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        .particle:nth-child(1) { width: 30px; height: 30px; left: 15%; animation-duration: 18s; animation-delay: 0s; }
        .particle:nth-child(2) { width: 25px; height: 25px; left: 25%; animation-duration: 22s; animation-delay: 3s; }
        .particle:nth-child(3) { width: 40px; height: 40px; left: 40%; animation-duration: 20s; animation-delay: 1s; }
        .particle:nth-child(4) { width: 20px; height: 20px; left: 55%; animation-duration: 24s; animation-delay: 4s; }
        .particle:nth-child(5) { width: 35px; height: 35px; left: 70%; animation-duration: 17s; animation-delay: 2s; }
        .particle:nth-child(6) { width: 28px; height: 28px; left: 80%; animation-duration: 21s; animation-delay: 5s; }
        .particle:nth-child(7) { width: 22px; height: 22px; left: 90%; animation-duration: 19s; animation-delay: 1s; }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        .signup-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .signup-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                0 0 100px rgba(30, 60, 114, 0.15);
            animation: slideUp 0.8s ease-out;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(30, 60, 114, 0.1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .signup-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .signup-header h2 {
            color: #1e3c72;
            font-size: 2.5rem;
            margin-bottom: 10px;
            animation: fadeInDown 0.8s ease-out 0.2s both;
        }

        .signup-header p {
            color: #2a5298;
            font-size: 1rem;
            animation: fadeInDown 0.8s ease-out 0.4s both;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 25px;
            animation: fadeInLeft 0.6s ease-out both;
        }

        .form-group:nth-child(1) { animation-delay: 0.5s; }
        .form-group:nth-child(2) { animation-delay: 0.6s; }
        .form-group:nth-child(3) { animation-delay: 0.7s; }
        .form-group:nth-child(4) { animation-delay: 0.8s; }
        .form-group:nth-child(5) { animation-delay: 0.9s; }

        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .form-group label {
            display: block;
            color: #1e3c72;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            background: #f8f9fa;
            color: #1e3c72;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2a5298;
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(42, 82, 152, 0.15);
        }

        .form-group input::placeholder {
            color: #95a5a6;
        }

        .btn-signup {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(30, 60, 114, 0.4);
            margin-top: 10px;
            animation: fadeInUp 0.6s ease-out 1s both;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-signup::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-signup:hover::before {
            left: 100%;
        }

        .btn-signup:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(30, 60, 114, 0.6);
        }

        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            animation: shake 0.5s ease-in-out, fadeIn 0.3s ease;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-danger {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #c0392b;
        }

        .alert-success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: #27ae60;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #2a5298;
            font-size: 0.95rem;
            animation: fadeIn 0.6s ease-out 1.2s both;
        }

        .login-link a {
            color: #1e3c72;
            text-decoration: none;
            font-weight: 700;
            position: relative;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #1e3c72;
            transition: width 0.3s ease;
        }

        .login-link a:hover::after {
            width: 100%;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-signup.loading .spinner {
            display: inline-block;
        }

        .btn-signup.loading .btn-text {
            display: none;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .signup-container {
                padding: 40px 25px;
            }
            .signup-header h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Blue & White Parallax Background -->
    <div class="parallax-container">
        <div class="parallax-layer layer-1"></div>
        <div class="parallax-layer layer-2"></div>
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>

    <div class="signup-wrapper">
        <div class="signup-container">
            <div class="signup-header">
                <h2>Create Account</h2>
                <p>Join us today and get started</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="signup-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Username *</label>
                        <input type="text" id="username" name="username" placeholder="Johnrey" required>
                    </div>
                    <div class="form-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" id="full_name" name="full_name" placeholder="John Rey">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password *</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
                </div>

                <button type="submit" class="btn-signup" id="submit-btn">
                    <span class="btn-text">Create Account</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="login-link">
                Already have an account? <a href="index.html">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        // Parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const layers = document.querySelectorAll('.parallax-layer');
            const x = (window.innerWidth - e.pageX * 2) / 100;
            const y = (window.innerHeight - e.pageY * 2) / 100;

            layers.forEach((layer, index) => {
                const speed = (index + 1) * 2;
                layer.style.transform = `translateX(${x * speed}px) translateY(${y * speed}px)`;
            });
        });

        // Signup form handler
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const full_name = document.getElementById('full_name').value.trim();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const alertBox = document.getElementById('alert');
            const submitBtn = document.getElementById('submit-btn');
            
            if (password !== confirm_password) {
                showAlert('Passwords do not match!', 'danger');
                return;
            }
            
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters!', 'danger');
                return;
            }
            
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            
            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                
                if (users.find(u => u.email === email)) {
                    showAlert('Email already exists!', 'danger');
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                    return;
                }
                
                if (users.find(u => u.username === username)) {
                    showAlert('Username already taken!', 'danger');
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                    return;
                }
                
                const newUser = {
                    id: Date.now(),
                    username: username,
                    email: email,
                    full_name: full_name || username,
                    password: password
                };
                
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                
                showAlert('Account created successfully! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            }, 1000);
        });

        function showAlert(message, type) {
            const alertBox = document.getElementById('alert');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type} show`;
            
            if (type === 'danger') {
                setTimeout(() => {
                    alertBox.classList.remove('show');
                }, 3000);
            }
        }
    </script>
</body>
</html>
